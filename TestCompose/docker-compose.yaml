services:

  simulator:
    restart: unless-stopped
    image: mars-iot-simulator:multiarch_v1
    ports:
      - "8080:8080"
    networks:
      - mars-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/discovery')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    restart: unless-stopped
    image: rabbitmq:3-management
    volumes:
      - ./templates/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./templates/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
      - "1883:1883"     # MQTT
      - "15675:15675"   # MQTT WebSockets
    networks:
      - mars-net
    command: sh -c "rabbitmq-plugins enable --offline rabbitmq_mqtt rabbitmq_web_mqtt && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-service:
    restart: unless-stopped
    build: ./sources/ingestion-service
    volumes:
      - ./templates/ingestion-service/config.yaml:/app/config.yaml
      - ./sources/ingestion-service:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      simulator:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - mars-net

  automation-engine:
    restart: unless-stopped
    build: ./sources/automation-engine
    volumes:
      - ./templates/automation-engine/config.yaml:/app/config.yaml
      - automation-data:/data
    ports:
      - "8081:8081"     # REST API (rules + state)
    depends_on:
      rabbitmq:
        condition: service_healthy
      simulator:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DB_PATH=/data/rules.db
    networks:
      - mars-net

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./sources/frontend-service:/usr/share/nginx/html:ro
    networks:
      - mars-net
    depends_on:
      - automation-engine

networks:
  mars-net:
    driver: bridge

volumes:
  - automation-data:/data