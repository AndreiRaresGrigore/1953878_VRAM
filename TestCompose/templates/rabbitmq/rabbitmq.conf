# abilita MQTT
mqtt.default_user = mars_admin
mqtt.default_pass = mars_admin
mqtt.listeners.tcp.default = 1883       # correzione della sintassi
mqtt.allow_anonymous = false
# mappatura MQTT → exchange AMQP
mqtt.exchange = sensor.events
# Enable management plugin configuration
loopback_users.guest = false

# Load preconfigured topology
management.load_definitions = /etc/rabbitmq/definitions.json

# Default virtual host
default_vhost = /

# Logging
log.console = true
log.console.level = info

# Limits (reasonable defaults)
vm_memory_high_watermark.relative = 0.6
disk_free_limit.relative = 1.0

# Enable TCP listener
listeners.tcp.default = 5672

# Management UI
management.tcp.port = 15672
management.tcp.ip = 0.0.0.0